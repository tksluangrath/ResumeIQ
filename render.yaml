databases:
  - name: resumeiq-db
    databaseName: resumeiq
    user: resumeiq
    plan: free

services:
  - type: web
    name: resumeiq-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resumeiq-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: LLM_PROVIDER
        value: deepseek
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRY_MINUTES
        value: "60"
      - key: SPACY_MODEL
        value: en_core_web_lg
      - key: SENTENCE_TRANSFORMER_MODEL
        value: all-MiniLM-L6-v2
